<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0a0f;
  --bg-card: #12121a;
  --bg-hover: #1a1a28;
  --gold: #d4a843;
  --gold-dim: #a07d2e;
  --gold-glow: rgba(212, 168, 67, 0.15);
  --silver: #8a9bb0;
  --text: #e8e4dd;
  --text-dim: #7a7670;
  --accent-red: #c44;
  --accent-green: #4a8;
  --accent-blue: #5588cc;
  --radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 999;
}

.app {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px 16px 80px;
}

/* HEADER */
.header {
  text-align: center;
  padding: 40px 0 30px;
  position: relative;
}

.header-icon {
  font-size: 48px;
  margin-bottom: 12px;
  display: block;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.2em;
  color: var(--gold);
  font-weight: 700;
  letter-spacing: -0.5px;
}

.header p {
  color: var(--silver);
  font-size: 0.95em;
  margin-top: 6px;
  font-weight: 300;
}

/* XP & STREAK BAR */
.xp-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  background: var(--bg-card);
  border: 1px solid rgba(212,168,67,0.1);
  border-radius: 30px;
  padding: 10px 20px;
  margin-bottom: 12px;
  font-size: 0.85em;
}
.xp-item { display: flex; align-items: center; gap: 6px; color: var(--silver); }
.xp-item .val { color: var(--gold); font-weight: 700; }

/* PROGRESS BAR */
.progress-container {
  background: var(--bg-card);
  border-radius: 30px;
  padding: 16px 20px;
  margin-bottom: 24px;
  border: 1px solid rgba(212,168,67,0.1);
}

.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.8em;
  color: var(--silver);
  margin-bottom: 8px;
}

.progress-bar {
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  border-radius: 3px;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

/* NAVIGATION TABS */
.nav-tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 8px;
  margin-bottom: 24px;
  scrollbar-width: none;
}
.nav-tabs::-webkit-scrollbar { display: none; }

.nav-tab {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 0.82em;
  font-weight: 500;
  cursor: pointer;
  background: var(--bg-card);
  color: var(--text-dim);
  border: 1px solid transparent;
  transition: all 0.3s ease;
  white-space: nowrap;
}

.nav-tab:hover { color: var(--text); background: var(--bg-hover); }

.nav-tab.active {
  background: var(--gold-glow);
  color: var(--gold);
  border-color: rgba(212,168,67,0.3);
}

/* LESSON CARD */
.lesson {
  animation: fadeUp 0.5s ease forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.lesson-header { margin-bottom: 24px; }

.lesson-phase {
  display: inline-block;
  font-size: 0.7em;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--gold);
  background: var(--gold-glow);
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 10px;
}

.lesson-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.7em;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 8px;
}

.lesson-subtitle {
  color: var(--silver);
  font-size: 0.92em;
  line-height: 1.7;
  font-weight: 300;
}

/* CONCEPT BLOCKS */
.concept {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 14px;
  border: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.concept::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 3px;
  height: 100%;
  background: var(--gold);
  opacity: 0;
  transition: opacity 0.3s;
}

.concept:hover { border-color: rgba(212,168,67,0.15); }
.concept:hover::before { opacity: 1; }

.concept.expanded { border-color: rgba(212,168,67,0.2); }
.concept.expanded::before { opacity: 1; }

.concept-header {
  display: flex;
  align-items: center;
  gap: 14px;
}

.concept-num {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85em;
  font-weight: 700;
  flex-shrink: 0;
}

.concept-num.gold { background: var(--gold-glow); color: var(--gold); }
.concept-num.blue { background: rgba(85,136,204,0.15); color: var(--accent-blue); }
.concept-num.green { background: rgba(68,170,136,0.15); color: var(--accent-green); }
.concept-num.red { background: rgba(204,68,68,0.15); color: var(--accent-red); }

.concept-title-row { flex: 1; }

.concept-name { font-size: 1em; font-weight: 600; }

.concept-hint {
  font-size: 0.78em;
  color: var(--text-dim);
  margin-top: 2px;
}

.concept-arrow {
  color: var(--text-dim);
  font-size: 0.8em;
  transition: transform 0.3s;
}

.concept.expanded .concept-arrow { transform: rotate(180deg); }

.concept-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease, padding 0.3s ease;
}

.concept.expanded .concept-body {
  max-height: 4000px;
  padding-top: 16px;
}

.concept-text {
  font-size: 0.9em;
  line-height: 1.9;
  color: var(--silver);
}

.concept-text strong { color: var(--text); font-weight: 600; }

/* ANALOGY BOX */
.analogy {
  background: rgba(212,168,67,0.06);
  border-left: 3px solid var(--gold-dim);
  padding: 14px 18px;
  border-radius: 12px 0 0 12px;
  margin: 14px 0;
  font-size: 0.88em;
  line-height: 1.8;
  color: var(--text);
}

.analogy-label {
  font-size: 0.72em;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--gold);
  margin-bottom: 6px;
}

/* PATTERN BOX */
.pattern-box {
  background: rgba(85,136,204,0.06);
  border-left: 3px solid var(--accent-blue);
  padding: 14px 18px;
  border-radius: 12px 0 0 12px;
  margin: 14px 0;
  font-size: 0.88em;
  line-height: 1.8;
  color: var(--text);
}
.pattern-label {
  font-size: 0.72em;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent-blue);
  margin-bottom: 6px;
}

/* HISTORY BOX */
.history-box {
  background: rgba(160,125,46,0.06);
  border-left: 3px solid var(--gold-dim);
  padding: 14px 18px;
  border-radius: 12px 0 0 12px;
  margin: 14px 0;
  font-size: 0.88em;
  line-height: 1.8;
  color: var(--silver);
  font-style: italic;
}
.history-label {
  font-size: 0.72em;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--gold-dim);
  margin-bottom: 6px;
  font-style: normal;
}

/* THINK-ALONG BOX */
.think-along {
  background: rgba(130,90,200,0.06);
  border: 1px solid rgba(130,90,200,0.15);
  border-radius: 12px;
  padding: 18px;
  margin: 14px 0;
}
.think-along-label {
  font-size: 0.72em;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #9b7fd4;
  margin-bottom: 8px;
}
.think-along-q {
  font-size: 0.92em;
  color: var(--text);
  margin-bottom: 12px;
  line-height: 1.7;
}
.think-along-opts { display: flex; flex-direction: column; gap: 8px; }
.think-along-opt {
  background: var(--bg-hover);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 0.88em;
  color: var(--silver);
  transition: all 0.3s;
}
.think-along-opt:hover { border-color: rgba(155,127,212,0.3); color: var(--text); }
.think-along-opt.correct { background: rgba(68,170,136,0.12); border-color: var(--accent-green); color: var(--accent-green); }
.think-along-opt.wrong { background: rgba(204,68,68,0.08); border-color: rgba(204,68,68,0.2); color: var(--accent-red); opacity: 0.7; }
.think-along-reveal {
  margin-top: 12px;
  padding: 14px;
  background: rgba(68,170,136,0.06);
  border-radius: 10px;
  font-size: 0.88em;
  line-height: 1.8;
  color: var(--silver);
  display: none;
}
.think-along-reveal.show { display: block; }

/* CHESS BOARD MINI */
.board-mini {
  display: inline-grid;
  grid-template-columns: repeat(8, 28px);
  grid-template-rows: repeat(8, 28px);
  gap: 0;
  border-radius: 6px;
  overflow: hidden;
  margin: 12px auto;
  border: 2px solid rgba(255,255,255,0.08);
}

.board-cell {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  line-height: 1;
}

.board-cell.light { background: #b7a67a; }
.board-cell.dark { background: #8b6f47; }
.board-cell.highlight { background: rgba(212,168,67,0.5) !important; }

/* VALUE TABLE */
.value-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 6px;
  margin: 12px 0;
}

.value-table td {
  padding: 10px 14px;
  background: var(--bg-hover);
  font-size: 0.88em;
}

.value-table tr td:first-child { border-radius: 10px 0 0 10px; }
.value-table tr td:last-child { border-radius: 0 10px 10px 0; text-align: center; }

.value-table .piece-icon { font-size: 1.3em; margin-right: 8px; }
.value-table .val { color: var(--gold); font-weight: 700; font-size: 1.1em; }

/* KEY RULE */
.key-rule {
  background: linear-gradient(135deg, rgba(212,168,67,0.08), rgba(212,168,67,0.02));
  border: 1px solid rgba(212,168,67,0.15);
  border-radius: 12px;
  padding: 16px 18px;
  margin: 14px 0;
  text-align: center;
}

.key-rule-label {
  font-size: 0.68em;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--gold);
  margin-bottom: 6px;
}

.key-rule-text {
  font-family: 'Playfair Display', serif;
  font-size: 1.1em;
  color: var(--text);
  line-height: 1.6;
}

/* MOVES NOTATION */
.moves {
  background: var(--bg-hover);
  border-radius: 10px;
  padding: 14px;
  font-family: monospace;
  font-size: 0.9em;
  text-align: left;
  color: var(--silver);
  margin: 10px 0;
  letter-spacing: 0.5px;
}

.moves span { color: var(--gold); }

/* PRACTICE BOX */
.practice-box {
  background: rgba(68,170,136,0.06);
  border: 1px solid rgba(68,170,136,0.15);
  border-radius: 12px;
  padding: 16px 18px;
  margin: 14px 0;
}

.practice-label {
  font-size: 0.72em;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent-green);
  margin-bottom: 8px;
}

.practice-text {
  font-size: 0.88em;
  line-height: 1.8;
  color: var(--silver);
}

/* MISTAKE BOX */
.mistake-box {
  background: rgba(204,68,68,0.06);
  border: 1px solid rgba(204,68,68,0.12);
  border-radius: 12px;
  padding: 16px 18px;
  margin: 14px 0;
}

.mistake-label {
  font-size: 0.72em;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent-red);
  margin-bottom: 8px;
}

/* QUIZ SECTION */
.quiz-section {
  background: var(--bg-card);
  border: 1px solid rgba(212,168,67,0.12);
  border-radius: var(--radius);
  padding: 24px;
  margin-top: 24px;
  margin-bottom: 14px;
}
.quiz-title {
  font-size: 0.72em;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--gold);
  margin-bottom: 16px;
  text-align: center;
}
.quiz-q {
  font-size: 0.95em;
  color: var(--text);
  margin-bottom: 12px;
  line-height: 1.6;
  font-weight: 500;
}
.quiz-opts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.quiz-opt {
  background: var(--bg-hover);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 11px 16px;
  cursor: pointer;
  font-size: 0.88em;
  color: var(--silver);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.quiz-opt:hover { border-color: rgba(212,168,67,0.2); color: var(--text); }
.quiz-opt.correct { background: rgba(68,170,136,0.12); border-color: var(--accent-green); color: var(--accent-green); }
.quiz-opt.wrong { background: rgba(204,68,68,0.08); border-color: rgba(204,68,68,0.2); color: var(--accent-red); opacity: 0.7; }
.quiz-opt.disabled { pointer-events: none; }
.quiz-opt-letter {
  width: 24px; height: 24px; border-radius: 6px;
  background: rgba(255,255,255,0.04); display: flex;
  align-items: center; justify-content: center;
  font-size: 0.78em; font-weight: 600; flex-shrink: 0;
}
.quiz-explanation {
  background: rgba(68,170,136,0.06);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 0.85em;
  line-height: 1.7;
  color: var(--silver);
  margin-top: 8px;
  display: none;
}
.quiz-explanation.show { display: block; }
.quiz-divider { height: 1px; background: rgba(255,255,255,0.04); margin: 20px 0; }

/* NAV BUTTONS */
.nav-buttons {
  display: flex;
  gap: 12px;
  margin-top: 30px;
}

.nav-btn {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-family: 'Inter', sans-serif;
  font-size: 0.92em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}

.nav-btn.primary {
  background: var(--gold);
  color: var(--bg-deep);
}
.nav-btn.primary:hover { background: #e0b44d; }

.nav-btn.secondary {
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.08);
}
.nav-btn.secondary:hover { background: var(--bg-hover); }

/* FOOTER QUOTE */
.footer-quote {
  text-align: center;
  padding: 30px 20px;
  font-family: 'Playfair Display', serif;
  color: var(--text-dim);
  font-size: 0.95em;
  line-height: 1.8;
}

.footer-quote .author {
  color: var(--gold-dim);
  font-size: 0.85em;
  margin-top: 4px;
}

/* COMPLETION SCREEN */
.completion-screen {
  text-align: center;
  padding: 60px 0 40px;
  animation: fadeUp 0.6s ease forwards;
}

.completion-badge {
  font-size: 80px;
  display: block;
  margin-bottom: 20px;
  animation: float 3s ease-in-out infinite;
  filter: drop-shadow(0 0 50px rgba(212,168,67,0.6));
}

.completion-title {
  font-family: 'Playfair Display', serif;
  font-size: 2em;
  color: var(--gold);
  margin-bottom: 12px;
  line-height: 1.3;
}

.completion-sub {
  color: var(--silver);
  font-size: 0.95em;
  line-height: 1.8;
  max-width: 480px;
  margin: 0 auto 36px;
  font-weight: 300;
}

.completion-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 36px;
}

.completion-stat {
  background: var(--bg-card);
  border: 1px solid rgba(212,168,67,0.12);
  border-radius: var(--radius);
  padding: 20px 12px;
}

.cs-v { font-size: 1.8em; font-weight: 700; color: var(--gold); font-family: 'Playfair Display', serif; }
.cs-l { font-size: 0.78em; color: var(--text-dim); margin-top: 4px; }

.completion-summary {
  background: var(--bg-card);
  border: 1px solid rgba(212,168,67,0.08);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 28px;
  text-align: left;
}

.cs-row {
  font-size: 0.88em;
  color: var(--silver);
  padding: 9px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  line-height: 1.6;
}
.cs-row:last-child { border-bottom: none; }

.completion-next {
  background: linear-gradient(135deg, rgba(212,168,67,0.08), rgba(212,168,67,0.02));
  border: 1px solid rgba(212,168,67,0.15);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 28px;
}

.cn-title {
  font-size: 0.7em; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 8px;
}

.cn-text { color: var(--silver); font-size: 0.9em; line-height: 1.7; margin-bottom: 16px; }

.completion-cta {
  display: inline-flex; align-items: center;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color: var(--bg-deep); font-family: 'Inter', sans-serif; font-weight: 700;
  font-size: 0.95em; padding: 12px 28px; border-radius: 30px;
  text-decoration: none; transition: all 0.3s;
}
.completion-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(212,168,67,0.35); }

.completion-actions {
  display: flex; gap: 12px; justify-content: center;
  flex-wrap: wrap; margin-top: 20px;
}

/* HOME LINK */
.home-link {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text-dim); font-size: 0.82em; text-decoration: none;
  padding: 6px 14px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.06);
  transition: all 0.3s; margin-bottom: 8px;
}
.home-link:hover { color: var(--gold); border-color: rgba(212,168,67,0.2); }

/* XP TOAST */
.xp-toast {
  position: fixed;
  top: 20px;
  right: 20px;
  background: var(--bg-card);
  border: 1px solid rgba(212,168,67,0.3);
  color: var(--gold);
  padding: 10px 20px;
  border-radius: 12px;
  font-size: 0.9em;
  font-weight: 600;
  z-index: 1000;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 1.5s forwards;
  pointer-events: none;
}
@keyframes toastIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(-10px); } }

@media (max-width: 400px) {
  .header h1 { font-size: 1.8em; }
  .lesson-title { font-size: 1.4em; }
  .board-mini { grid-template-columns: repeat(8, 24px); grid-template-rows: repeat(8, 24px); }
  .board-cell { font-size: 15px; }
  .completion-grid { grid-template-columns: repeat(3, 1fr); }
  .xp-bar { flex-wrap: wrap; gap: 12px; }
}
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>
// ── Course Content ──
const lessons = [
  {
    phase: "Foundation",
    title: "See the Board Like a Commander",
    subtitle: "Before you move a single piece, understand this: chess is not a game of pieces. It is a game of squares. Whoever controls the right squares controls the game.",
    concepts: [
      {
        num: "1", color: "gold",
        name: "The Center Is the Throne",
        hint: "d4 - d5 - e4 - e5",
        body: `<div class="concept-text">
          <strong>Imagine the board as a city.</strong> The four central squares (e4, d4, e5, d5) are the main plaza. Whoever controls the plaza controls every street branching out from it.
          <div class="analogy">
            <div class="analogy-label">Analogy</div>
            In soccer, the team that controls the midfield dictates the pace. The center in chess works exactly the same way.
          </div>
          <strong>Why is the center so important?</strong><br>

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2,'0'); }).join('');
}

    '<div style="margin-top:28px">' +
      '<button class="nav-btn secondary" onclick="goToLesson(0)" style="width:100%">&larr; Back to Free Preview</button>' +
    '</div>' +
  '</div>';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── XP System ──
var xpState = JSON.parse(localStorage.getItem('ca_en_xp') || '{"total":0,"conceptsExpanded":[],"quizzesCorrect":[],"phasesCompleted":[]}');
function saveXP() { localStorage.setItem('ca_en_xp', JSON.stringify(xpState)); }
function addXP(amount, type, id) {
  var list;
  if (type === 'concept') list = xpState.conceptsExpanded;
  else if (type === 'quiz') list = xpState.quizzesCorrect;
  else if (type === 'phase') list = xpState.phasesCompleted;
  else return;
  if (list.indexOf(id) !== -1) return;
  list.push(id);
  xpState.total += amount;
  saveXP();
  showXPToast('+' + amount + ' XP');
  updateXPDisplay();
}
function showXPToast(msg) {
  var t = document.createElement('div');
  t.className = 'xp-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 2000);
}
function updateXPDisplay() {
  var el = document.getElementById('xp-display');
  if (el) el.textContent = xpState.total;
}

// ── Daily Streak ──
var streakData = JSON.parse(localStorage.getItem('ca_en_streak') || '{"count":0,"lastDate":""}');
function checkStreak() {
  var today = new Date().toISOString().slice(0, 10);
  if (streakData.lastDate === today) return;
  var yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (streakData.lastDate === yesterday) {
    streakData.count += 1;
  } else if (streakData.lastDate !== today) {
    streakData.count = 1;
  }
  streakData.lastDate = today;
  localStorage.setItem('ca_en_streak', JSON.stringify(streakData));
}
checkStreak();

// ── State ──
var currentLesson = parseInt(localStorage.getItem('ca_en_lesson') || '0');
var expandedConcepts = {};
var completedLessons = JSON.parse(localStorage.getItem('ca_en_completed') || '[]');
var answeredQuizzes = JSON.parse(localStorage.getItem('ca_en_quizzes') || '{}');

function saveState() {
  localStorage.setItem('ca_en_lesson', currentLesson);
  localStorage.setItem('ca_en_completed', JSON.stringify(completedLessons));
  localStorage.setItem('ca_en_quizzes', JSON.stringify(answeredQuizzes));
}

function toggleConcept(lessonIdx, conceptIdx) {
  var key = lessonIdx + '-' + conceptIdx;
  if (expandedConcepts[key]) {
    delete expandedConcepts[key];
  } else {
    expandedConcepts[key] = true;
    addXP(10, 'concept', key);
  }
  render();
}

function goToLesson(idx) {
  if (idx >= FREE_LESSONS && !hasFullAccess()) { renderGate(); return; }
  currentLesson = idx;
  expandedConcepts = {};
  saveState();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextLesson() {
  if (completedLessons.indexOf(currentLesson) === -1) {
    completedLessons.push(currentLesson);
    addXP(100, 'phase', 'phase-' + currentLesson);
  }
  saveState();
  if (currentLesson < lessons.length - 1) {
    goToLesson(currentLesson + 1);
  } else {
    renderCompletion();
  }
}

function prevLesson() {
  if (currentLesson > 0) goToLesson(currentLesson - 1);
}

function resetProgress() {
  if (!confirm('Are you sure you want to reset all progress?')) return;
  completedLessons = [];
  currentLesson = 0;
  xpState = {total:0,conceptsExpanded:[],quizzesCorrect:[],phasesCompleted:[]};
  answeredQuizzes = {};
  saveXP();
  saveState();
  goToLesson(0);
}

// ── Quiz Handler ──
function answerQuiz(lessonIdx, quizIdx, chosenIdx) {
  var qKey = lessonIdx + '-' + quizIdx;
  if (answeredQuizzes[qKey] !== undefined) return;
  var quiz = lessons[lessonIdx].quiz[quizIdx];
  var isCorrect = chosenIdx === quiz.correct;
  answeredQuizzes[qKey] = chosenIdx;
  saveState();
  if (isCorrect) {
    addXP(25, 'quiz', qKey);
  }
  // Update DOM directly for speed
  var opts = document.querySelectorAll('#quiz-' + lessonIdx + '-' + quizIdx + ' .quiz-opt');
  for (var i = 0; i < opts.length; i++) {
    opts[i].classList.add('disabled');
    if (i === quiz.correct) opts[i].classList.add('correct');
    else if (i === chosenIdx && !isCorrect) opts[i].classList.add('wrong');
  }
  var expl = document.getElementById('quiz-expl-' + lessonIdx + '-' + quizIdx);
  if (expl) expl.classList.add('show');
}

// ── Think-Along Handler ──
function revealThinkAlong(el, isCorrect) {
  var parent = el.closest('.think-along');
  if (!parent) return;
  var opts = parent.querySelectorAll('.think-along-opt');
  var alreadyAnswered = false;
  for (var i = 0; i < opts.length; i++) {
    if (opts[i].classList.contains('correct') || opts[i].classList.contains('wrong')) { alreadyAnswered = true; break; }
  }
  if (alreadyAnswered) return;
  for (var j = 0; j < opts.length; j++) {
    opts[j].style.pointerEvents = 'none';
  }
  if (isCorrect) {
    el.classList.add('correct');
  } else {
    el.classList.add('wrong');
    for (var k = 0; k < opts.length; k++) {
      if (opts[k].getAttribute('onclick') && opts[k].getAttribute('onclick').indexOf('true') !== -1) {
        opts[k].classList.add('correct');
      }
    }
  }
  var reveal = parent.querySelector('.think-along-reveal');
  if (reveal) reveal.classList.add('show');
}

function renderCompletion() {
  var app = document.getElementById('app');
  app.innerHTML = '<div class="completion-screen">' +
    '<a href="en/index.html" class="home-link">&larr; Home</a>' +
    '<span class="completion-badge">' + String.fromCodePoint(0x265A) + '</span>' +
    '<div class="completion-title">Congratulations &mdash; You Finished the Entire Course</div>' +
    '<div class="completion-sub">You have covered the ground that most players never bother to learn. You now have the foundation that 90% of players worldwide are missing.</div>' +
    '<div class="completion-grid">' +
      '<div class="completion-stat"><div class="cs-v">6</div><div class="cs-l">Phases complete</div></div>' +
      '<div class="completion-stat"><div class="cs-v">30+</div><div class="cs-l">Concepts learned</div></div>' +
      '<div class="completion-stat"><div class="cs-v">' + xpState.total + '</div><div class="cs-l">XP earned</div></div>' +
    '</div>' +
    '<div class="completion-summary">' +
      '<div class="cs-row">' + String.fromCodePoint(0x2713) + ' Foundation &mdash; Center control and piece values</div>' +
      '<div class="cs-row">' + String.fromCodePoint(0x2713) + ' Opening &mdash; The 4 tasks and your first weapons</div>' +
      '<div class="cs-row">' + String.fromCodePoint(0x2713) + ' Tactics &mdash; Fork, pin, skewer, and discovered attacks</div>' +
      '<div class="cs-row">' + String.fromCodePoint(0x2713) + ' Strategy &mdash; The thinking system and positional play</div>' +
      '<div class="cs-row">' + String.fromCodePoint(0x2713) + ' Endgame &mdash; King activation, promotion, and key positions</div>' +
      '<div class="cs-row">' + String.fromCodePoint(0x2713) + ' Roadmap &mdash; Daily routine and improvement plan</div>' +
    '</div>' +
    '<div class="completion-next">' +
      '<div class="cn-title">Your Next Step</div>' +
      '<div class="cn-text">Open Lichess right now and apply what you learned. Thirty minutes daily &mdash; tactical puzzles + one game + analysis &mdash; is enough to see measurable improvement within one month.</div>' +
      '<a href="https://lichess.org" target="_blank" class="completion-cta">Open Lichess &mdash; Start Practicing &rarr;</a>' +
    '</div>' +
    '<div class="completion-actions">' +
      '<button class="nav-btn secondary" onclick="goToLesson(0)" style="flex:1">Review from Start &larr;</button>' +
      '<button class="nav-btn secondary" onclick="resetProgress()" style="flex:1;color:var(--accent-red)">Reset Progress</button>' +
    '</div>' +
  '</div>';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  var app = document.getElementById('app');
  var lesson = lessons[currentLesson];
  var totalComplete = completedLessons.length;
  var progress = (totalComplete / lessons.length) * 100;
  var letters = ['A', 'B', 'C', 'D'];

  var html = '<div class="header">' +
    '<a href="en/index.html" class="home-link">&larr; Home</a>' +
    '<span class="header-icon">' + String.fromCodePoint(0x265A) + '</span>' +
    '<h1>Chess Academy</h1>' +
    '<p>From zero to thinking like a pro</p>' +
  '</div>' +
  '<div class="xp-bar">' +
    '<div class="xp-item"><span>' + String.fromCodePoint(0x2B50) + '</span> <span class="val" id="xp-display">' + xpState.total + '</span> XP</div>' +
    '<div class="xp-item"><span>' + String.fromCodePoint(0x1F525) + '</span> <span class="val">' + streakData.count + '</span> day streak</div>' +
  '</div>' +
  '<div class="progress-container">' +
    '<div class="progress-label">' +
      '<span>Phase ' + (currentLesson + 1) + ' of ' + lessons.length + '</span>' +
      '<span>' + Math.round(progress) + '% complete</span>' +
    '</div>' +
    '<div class="progress-bar"><div class="progress-fill" style="width:' + progress + '%"></div></div>' +
  '</div>' +
  '<div class="nav-tabs">';

  for (var ti = 0; ti < lessons.length; ti++) {
    var tabClass = ti === currentLesson ? 'nav-tab active' : 'nav-tab';
    var prefix = '';
    if (completedLessons.indexOf(ti) !== -1) prefix = String.fromCodePoint(0x2713) + ' ';
    else if (ti >= FREE_LESSONS && !hasFullAccess()) prefix = String.fromCodePoint(0x1F512) + ' ';
    html += '<div class="' + tabClass + '" onclick="goToLesson(' + ti + ')">' + prefix + lessons[ti].phase + '</div>';
  }

  html += '</div>' +
  '<div class="lesson" key="' + currentLesson + '">' +
    '<div class="lesson-header">' +
      '<div class="lesson-phase">Phase ' + (currentLesson + 1) + ' &mdash; ' + lesson.phase + '</div>' +
      '<div class="lesson-title">' + lesson.title + '</div>' +
      '<div class="lesson-subtitle">' + lesson.subtitle + '</div>' +
    '</div>';

  for (var ci = 0; ci < lesson.concepts.length; ci++) {
    var c = lesson.concepts[ci];
    var isExp = expandedConcepts[currentLesson + '-' + ci];
    html += '<div class="concept ' + (isExp ? 'expanded' : '') + '" onclick="toggleConcept(' + currentLesson + ',' + ci + ')">' +
      '<div class="concept-header">' +
        '<div class="concept-num ' + c.color + '">' + c.num + '</div>' +
        '<div class="concept-title-row">' +
          '<div class="concept-name">' + c.name + '</div>' +
          '<div class="concept-hint">' + c.hint + '</div>' +
        '</div>' +
        '<div class="concept-arrow">' + String.fromCodePoint(0x25BC) + '</div>' +
      '</div>' +
      '<div class="concept-body">' + c.body + '</div>' +
    '</div>';
  }

  // Quiz section
  if (lesson.quiz && lesson.quiz.length > 0) {
    html += '<div class="quiz-section"><div class="quiz-title">Test Your Knowledge</div>';
    for (var qi = 0; qi < lesson.quiz.length; qi++) {
      var q = lesson.quiz[qi];
      var qKey = currentLesson + '-' + qi;
      var wasAnswered = answeredQuizzes[qKey] !== undefined;
      if (qi > 0) html += '<div class="quiz-divider"></div>';
      html += '<div id="quiz-' + currentLesson + '-' + qi + '">' +
        '<div class="quiz-q">' + (qi + 1) + '. ' + q.q + '</div>' +
        '<div class="quiz-opts">';
      for (var oi = 0; oi < q.opts.length; oi++) {
        var optClass = 'quiz-opt';
        if (wasAnswered) {
          optClass += ' disabled';
          if (oi === q.correct) optClass += ' correct';
          else if (oi === answeredQuizzes[qKey] && oi !== q.correct) optClass += ' wrong';
        }
        html += '<div class="' + optClass + '" onclick="answerQuiz(' + currentLesson + ',' + qi + ',' + oi + ')">' +
          '<div class="quiz-opt-letter">' + letters[oi] + '</div>' + q.opts[oi] +
        '</div>';
      }
      html += '</div>';
      html += '<div class="quiz-explanation ' + (wasAnswered ? 'show' : '') + '" id="quiz-expl-' + currentLesson + '-' + qi + '">' + q.explanation + '</div>';
      html += '</div>';
    }
    html += '</div>';
  }

  html += '<div class="footer-quote">' +
    '&ldquo;' + lesson.quote.text + '&rdquo;' +
    '<div class="author">&mdash; ' + lesson.quote.author + '</div>' +
  '</div>' +
  '<div class="nav-buttons">';

  if (currentLesson > 0) {
    html += '<button class="nav-btn secondary" onclick="prevLesson()">&larr; Previous</button>';
  }
  if (currentLesson < lessons.length - 1) {
    if (currentLesson === FREE_LESSONS - 1 && !hasFullAccess()) {
      html += '<button class="nav-btn primary" onclick="nextLesson()">' + String.fromCodePoint(0x1F513) + ' Mastered This &mdash; Unlock the Rest &rarr;</button>';
    } else {
      html += '<button class="nav-btn primary" onclick="nextLesson()">Mastered This Phase &rarr;</button>';
    }
  } else {
    html += '<button class="nav-btn primary" onclick="nextLesson()">Finished &mdash; See Your Summary ' + String.fromCodePoint(0x2713) + '</button>';
  }

  html += '</div></div>';
  app.innerHTML = html;
}

render();
</script>
</body>
</html>
