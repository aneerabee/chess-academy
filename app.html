<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أكاديمية الشطرنج</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0a0f;
  --bg-card: #12121a;
  --bg-hover: #1a1a28;
  --gold: #d4a843;
  --gold-dim: #a07d2e;
  --gold-glow: rgba(212, 168, 67, 0.15);
  --silver: #8a9bb0;
  --text: #e8e4dd;
  --text-dim: #7a7670;
  --accent-red: #c44;
  --accent-green: #4a8;
  --accent-blue: #5588cc;
  --radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Subtle grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 999;
}

.app {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px 16px 80px;
}

/* HEADER */
.header {
  text-align: center;
  padding: 40px 0 30px;
  position: relative;
}

.header-icon {
  font-size: 48px;
  margin-bottom: 12px;
  display: block;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.header h1 {
  font-family: 'Amiri', serif;
  font-size: 2.2em;
  color: var(--gold);
  font-weight: 700;
  letter-spacing: -0.5px;
}

.header p {
  color: var(--silver);
  font-size: 0.95em;
  margin-top: 6px;
  font-weight: 300;
}

/* PROGRESS BAR */
.progress-container {
  background: var(--bg-card);
  border-radius: 30px;
  padding: 16px 20px;
  margin-bottom: 24px;
  border: 1px solid rgba(212,168,67,0.1);
}

.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.8em;
  color: var(--silver);
  margin-bottom: 8px;
}

.progress-bar {
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  border-radius: 3px;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

/* NAVIGATION TABS */
.nav-tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 8px;
  margin-bottom: 24px;
  scrollbar-width: none;
}
.nav-tabs::-webkit-scrollbar { display: none; }

.nav-tab {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 0.82em;
  font-weight: 500;
  cursor: pointer;
  background: var(--bg-card);
  color: var(--text-dim);
  border: 1px solid transparent;
  transition: all 0.3s ease;
  white-space: nowrap;
}

.nav-tab:hover { color: var(--text); background: var(--bg-hover); }

.nav-tab.active {
  background: var(--gold-glow);
  color: var(--gold);
  border-color: rgba(212,168,67,0.3);
}

/* LESSON CARD */
.lesson {
  animation: fadeUp 0.5s ease forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.lesson-header {
  margin-bottom: 24px;
}

.lesson-phase {
  display: inline-block;
  font-size: 0.7em;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--gold);
  background: var(--gold-glow);
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 10px;
}

.lesson-title {
  font-family: 'Amiri', serif;
  font-size: 1.7em;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 8px;
}

.lesson-subtitle {
  color: var(--silver);
  font-size: 0.92em;
  line-height: 1.7;
  font-weight: 300;
}

/* CONCEPT BLOCKS */
.concept {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 14px;
  border: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.concept::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 3px;
  height: 100%;
  background: var(--gold);
  opacity: 0;
  transition: opacity 0.3s;
}

.concept:hover { border-color: rgba(212,168,67,0.15); }
.concept:hover::before { opacity: 1; }

.concept.expanded { border-color: rgba(212,168,67,0.2); }
.concept.expanded::before { opacity: 1; }

.concept-header {
  display: flex;
  align-items: center;
  gap: 14px;
}

.concept-num {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85em;
  font-weight: 700;
  flex-shrink: 0;
}

.concept-num.gold { background: var(--gold-glow); color: var(--gold); }
.concept-num.blue { background: rgba(85,136,204,0.15); color: var(--accent-blue); }
.concept-num.green { background: rgba(68,170,136,0.15); color: var(--accent-green); }
.concept-num.red { background: rgba(204,68,68,0.15); color: var(--accent-red); }

.concept-title-row {
  flex: 1;
}

.concept-name {
  font-size: 1em;
  font-weight: 600;
}

.concept-hint {
  font-size: 0.78em;
  color: var(--text-dim);
  margin-top: 2px;
}

.concept-arrow {
  color: var(--text-dim);
  font-size: 0.8em;
  transition: transform 0.3s;
}

.concept.expanded .concept-arrow { transform: rotate(180deg); }

.concept-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease, padding 0.3s ease;
}

.concept.expanded .concept-body {
  max-height: 2000px;
  padding-top: 16px;
}

.concept-text {
  font-size: 0.9em;
  line-height: 1.9;
  color: var(--silver);
}

.concept-text strong { color: var(--text); font-weight: 600; }

/* ANALOGY BOX */
.analogy {
  background: rgba(212,168,67,0.06);
  border-right: 3px solid var(--gold-dim);
  padding: 14px 18px;
  border-radius: 0 12px 12px 0;
  margin: 14px 0;
  font-size: 0.88em;
  line-height: 1.8;
  color: var(--text);
}

.analogy-label {
  font-size: 0.72em;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--gold);
  margin-bottom: 6px;
}

/* CHESS BOARD MINI */
.board-mini {
  display: inline-grid;
  grid-template-columns: repeat(8, 28px);
  grid-template-rows: repeat(8, 28px);
  gap: 0;
  border-radius: 6px;
  overflow: hidden;
  margin: 12px auto;
  border: 2px solid rgba(255,255,255,0.08);
}

.board-cell {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  line-height: 1;
}

.board-cell.light { background: #b7a67a; }
.board-cell.dark { background: #8b6f47; }
.board-cell.highlight { background: rgba(212,168,67,0.5) !important; }

/* VALUE TABLE */
.value-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 6px;
  margin: 12px 0;
}

.value-table td {
  padding: 10px 14px;
  background: var(--bg-hover);
  font-size: 0.88em;
}

.value-table tr td:first-child { border-radius: 0 10px 10px 0; }
.value-table tr td:last-child { border-radius: 10px 0 0 10px; text-align: center; }

.value-table .piece-icon { font-size: 1.3em; margin-left: 8px; }
.value-table .val { color: var(--gold); font-weight: 700; font-size: 1.1em; }

/* KEY RULE */
.key-rule {
  background: linear-gradient(135deg, rgba(212,168,67,0.08), rgba(212,168,67,0.02));
  border: 1px solid rgba(212,168,67,0.15);
  border-radius: 12px;
  padding: 16px 18px;
  margin: 14px 0;
  text-align: center;
}

.key-rule-label {
  font-size: 0.68em;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--gold);
  margin-bottom: 6px;
}

.key-rule-text {
  font-family: 'Amiri', serif;
  font-size: 1.1em;
  color: var(--text);
  line-height: 1.6;
}

/* MOVES NOTATION */
.moves {
  background: var(--bg-hover);
  border-radius: 10px;
  padding: 14px;
  font-family: monospace;
  font-size: 0.9em;
  direction: ltr;
  text-align: left;
  color: var(--silver);
  margin: 10px 0;
  letter-spacing: 0.5px;
}

.moves span { color: var(--gold); }

/* PRACTICE BOX */
.practice-box {
  background: rgba(68,170,136,0.06);
  border: 1px solid rgba(68,170,136,0.15);
  border-radius: 12px;
  padding: 16px 18px;
  margin: 14px 0;
}

.practice-label {
  font-size: 0.72em;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent-green);
  margin-bottom: 8px;
}

.practice-text {
  font-size: 0.88em;
  line-height: 1.8;
  color: var(--silver);
}

/* MISTAKE BOX */
.mistake-box {
  background: rgba(204,68,68,0.06);
  border: 1px solid rgba(204,68,68,0.12);
  border-radius: 12px;
  padding: 16px 18px;
  margin: 14px 0;
}

.mistake-label {
  font-size: 0.72em;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent-red);
  margin-bottom: 8px;
}

/* NAV BUTTONS */
.nav-buttons {
  display: flex;
  gap: 12px;
  margin-top: 30px;
}

.nav-btn {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-family: 'Tajawal', sans-serif;
  font-size: 0.92em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}

.nav-btn.primary {
  background: var(--gold);
  color: var(--bg-deep);
}
.nav-btn.primary:hover { background: #e0b44d; }

.nav-btn.secondary {
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.08);
}
.nav-btn.secondary:hover { background: var(--bg-hover); }

/* FOOTER QUOTE */
.footer-quote {
  text-align: center;
  padding: 30px 20px;
  font-family: 'Amiri', serif;
  color: var(--text-dim);
  font-size: 0.95em;
  line-height: 1.8;
}

.footer-quote .author {
  color: var(--gold-dim);
  font-size: 0.85em;
  margin-top: 4px;
}

/* ── COMPLETION SCREEN ── */
.completion-screen {
  text-align: center;
  padding: 60px 0 40px;
  animation: fadeUp 0.6s ease forwards;
}

.completion-badge {
  font-size: 80px;
  display: block;
  margin-bottom: 20px;
  animation: float 3s ease-in-out infinite;
  filter: drop-shadow(0 0 50px rgba(212,168,67,0.6));
}

.completion-title {
  font-family: 'Amiri', serif;
  font-size: 2em;
  color: var(--gold);
  margin-bottom: 12px;
  line-height: 1.3;
}

.completion-sub {
  color: var(--silver);
  font-size: 0.95em;
  line-height: 1.8;
  max-width: 480px;
  margin: 0 auto 36px;
  font-weight: 300;
}

.completion-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 36px;
}

.completion-stat {
  background: var(--bg-card);
  border: 1px solid rgba(212,168,67,0.12);
  border-radius: var(--radius);
  padding: 20px 12px;
}

.cs-v { font-size: 1.8em; font-weight: 700; color: var(--gold); font-family: 'Amiri', serif; }
.cs-l { font-size: 0.78em; color: var(--text-dim); margin-top: 4px; }

.completion-summary {
  background: var(--bg-card);
  border: 1px solid rgba(212,168,67,0.08);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 28px;
  text-align: right;
}

.cs-row {
  font-size: 0.88em;
  color: var(--silver);
  padding: 9px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  line-height: 1.6;
}
.cs-row:last-child { border-bottom: none; }

.completion-next {
  background: linear-gradient(135deg, rgba(212,168,67,0.08), rgba(212,168,67,0.02));
  border: 1px solid rgba(212,168,67,0.15);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 28px;
}

.cn-title {
  font-size: 0.7em; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 8px;
}

.cn-text { color: var(--silver); font-size: 0.9em; line-height: 1.7; margin-bottom: 16px; }

.completion-cta {
  display: inline-flex; align-items: center;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color: var(--bg-deep); font-family: 'Tajawal', sans-serif; font-weight: 700;
  font-size: 0.95em; padding: 12px 28px; border-radius: 30px;
  text-decoration: none; transition: all 0.3s;
}
.completion-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(212,168,67,0.35); }

.completion-actions {
  display: flex; gap: 12px; justify-content: center;
  flex-wrap: wrap; margin-top: 20px;
}

/* HOME LINK */
.home-link {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text-dim); font-size: 0.82em; text-decoration: none;
  padding: 6px 14px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.06);
  transition: all 0.3s; margin-bottom: 8px;
}
.home-link:hover { color: var(--gold); border-color: rgba(212,168,67,0.2); }

@media (max-width: 400px) {
  .header h1 { font-size: 1.8em; }
  .lesson-title { font-size: 1.4em; }
  .board-mini { grid-template-columns: repeat(8, 24px); grid-template-rows: repeat(8, 24px); }
  .board-cell { font-size: 15px; }
  .completion-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>
const lessons = [
  {
    phase: "الأساس",
    title: "الرقعة ليست مسطحة — تعلّم تراها بعيون قائد",
    subtitle: "قبل أن تحرك أي قطعة، افهم أن الشطرنج ليس لعبة قطع… بل لعبة مربعات. من يتحكم بالمربعات الصحيحة يتحكم باللعبة.",
    concepts: [
      {
        num: "١", color: "gold",
        name: "المركز هو العرش",
        hint: "d4 · d5 · e4 · e5",
        body: `<div class="concept-text">
          <strong>تخيل الرقعة كمدينة.</strong> المربعات الأربعة في الوسط (e4, d4, e5, d5) هي ميدان المدينة الرئيسي. من يسيطر على الميدان يتحكم بكل الشوارع المتفرعة منه.
          <div class="analogy">
            <div class="analogy-label">تشبيه</div>
            في كرة القدم، الفريق الذي يسيطر على وسط الملعب يتحكم بإيقاع اللعب. المركز في الشطرنج هو نفس الفكرة بالضبط.
          </div>
          <strong>لماذا المركز مهم جداً؟</strong><br>
          — القطعة في المركز تتحكم بأكبر عدد من المربعات<br>
          — حصان في e4 يهاجم 8 مربعات. نفس الحصان في الزاوية (a1) يهاجم مربعين فقط!<br>
          — التحكم بالمركز يمنحك حرية تحريك قطعك لأي جهة
          <div class="key-rule">
            <div class="key-rule-label">قاعدة ذهبية</div>
            <div class="key-rule-text">أول نقلتين دائماً: بيدق إلى e4 أو d4 ثم أخرج حصاناً</div>
          </div>
        </div>`
      },
      {
        num: "٢", color: "blue",
        name: "قيمة القطع — عملتك في المعركة",
        hint: "اعرف قيمة جيشك",
        body: `<div class="concept-text">
          كل قطعة لها "سعر". قبل أي مبادلة، احسب: هل أنا رابح أم خاسر؟
          <table class="value-table">
            <tr><td><span class="piece-icon">♟</span> بيدق</td><td><span class="val">1</span></td></tr>
            <tr><td><span class="piece-icon">♞</span> حصان</td><td><span class="val">3</span></td></tr>
            <tr><td><span class="piece-icon">♝</span> فيل</td><td><span class="val">3</span></td></tr>
            <tr><td><span class="piece-icon">♜</span> قلعة</td><td><span class="val">5</span></td></tr>
            <tr><td><span class="piece-icon">♛</span> وزير</td><td><span class="val">9</span></td></tr>
            <tr><td><span class="piece-icon">♚</span> ملك</td><td><span class="val">∞</span></td></tr>
          </table>
          <div class="analogy">
            <div class="analogy-label">تشبيه</div>
            فكر فيها كعملة. إذا أعطيت 5 دولارات (قلعة) مقابل 3 دولارات (حصان) بدون سبب تكتيكي، أنت خسرت دولارين. بسيطة.
          </div>
          <strong>ملاحظات مهمة:</strong><br>
          — فيلين اثنين معاً (زوج الفيلة) أقوى من حصانين — يغطيان كل ألوان المربعات<br>
          — الحصان أفضل في المواقف "المغلقة" (بيادق كثيرة متشابكة)<br>
          — الفيل أفضل في المواقف "المفتوحة" (أقطار طويلة حرة)<br>
          — القلعة تحتاج أعمدة مفتوحة (بدون بيادق) لتكون فعالة
          <div class="mistake-box">
            <div class="mistake-label">خطأ شائع</div>
            المبتدئ يبادل قلعة (5) بحصان (3) ظناً أنه "أخذ قطعة". أنت خسرت نقطتين!
          </div>
        </div>`
      },
      {
        num: "٣", color: "green",
        name: "السؤال الذي يصنع الفرق",
        hint: "قبل كل نقلة",
        body: `<div class="concept-text">
          <div class="key-rule">
            <div class="key-rule-label">السؤال السحري</div>
            <div class="key-rule-text">«ماذا يريد خصمي من نقلته الأخيرة؟»</div>
          </div>
          هذا السؤال وحده سيمنعك من 70% من الأخطاء. معظم المبتدئين يلعبون وكأن الخصم غير موجود — يفكرون في خطتهم فقط ولا ينظرون لما يفعله الطرف الآخر.
          <div class="analogy">
            <div class="analogy-label">تشبيه</div>
            تخيل ملاكم يستعد لضربة قوية لكنه لا يراقب يد خصمه. سيُضرب قبل أن يضرب. الشطرنج نفس الشيء: اقرأ نقلة خصمك أولاً.
          </div>
          <strong>كيف تقرأ نقلة الخصم؟</strong><br>
          ١. هل يهدد أخذ قطعة؟<br>
          ٢. هل يجهز لتهديد في النقلة القادمة؟<br>
          ٣. هل حسّن موقع إحدى قطعه؟<br>
          ٤. إذا لم يهدد شيئاً — عظيم، نفّذ خطتك أنت
          <div class="practice-box">
            <div class="practice-label">تمرين عملي</div>
            <div class="practice-text">في مبارياتك الخمس القادمة، قبل كل نقلة تلعبها، قل لنفسك بصوت مسموع: "هو يريد..." — حتى لو الجواب "لا شيء واضح". بناء هذه العادة أهم من أي افتتاحية.</div>
          </div>
        </div>`
      }
    ],
    quote: { text: "الشطرنج هو فن التحليل", author: "ميخائيل بوتفينيك — بطل العالم" }
  },
  {
    phase: "الافتتاح",
    title: "أول 10 نقلات — خطة واضحة بدل العشوائية",
    subtitle: "الافتتاح ليس حفظ نقلات. هو تنفيذ 4 مهام بأسرع ما يمكن. من ينجز المهام أولاً يبدأ المعركة وهو في موقع القوة.",
    concepts: [

// ── Access Control ──
const FREE_LESSONS = 2;
const CODE_HASH = '3eabe4f63beddd23a720da021f2084f8b6c0255f9a4385231f491c8c32545a9c';
const GUMROAD_URL = 'https://gumroad.com/l/chess-academy-ar';

function hasFullAccess() { return localStorage.getItem('ca_access') === 'granted'; }

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function verifyCode() {
  const input = document.getElementById('gate-code');
  const msg = document.getElementById('gate-msg');
  const code = input.value.trim().toUpperCase();
  if (!code) { msg.textContent = 'أدخل رمز الوصول'; msg.style.color = 'var(--accent-red)'; return; }
  const hash = await sha256(code);
  if (hash === CODE_HASH) {
    localStorage.setItem('ca_access', 'granted');
    goToLesson(currentLesson);
  } else {
    msg.textContent = 'رمز غير صحيح — تأكد من الرمز الذي حصلت عليه بعد الشراء';
    msg.style.color = 'var(--accent-red)';
    input.value = '';
  }
}

// ── State (persisted to localStorage) ──
let currentLesson = parseInt(localStorage.getItem('ca_lesson') || '0');
let expandedConcepts = new Set();
let completedLessons = new Set(JSON.parse(localStorage.getItem('ca_completed') || '[]'));

function saveState() {
  localStorage.setItem('ca_lesson', currentLesson);
  localStorage.setItem('ca_completed', JSON.stringify([...completedLessons]));
}

function toggleConcept(lessonIdx, conceptIdx) {
  const key = `${lessonIdx}-${conceptIdx}`;
  if (expandedConcepts.has(key)) expandedConcepts.delete(key);
  else expandedConcepts.add(key);
  render();
}

function goToLesson(idx) {
  if (idx >= FREE_LESSONS && !hasFullAccess()) { renderGate(); return; }
  currentLesson = idx;
  expandedConcepts.clear();
  saveState();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextLesson() {
  completedLessons.add(currentLesson);
  saveState();
  if (currentLesson < lessons.length - 1) {
    goToLesson(currentLesson + 1);
  } else {
    renderCompletion();
  }
}

function prevLesson() {
  if (currentLesson > 0) goToLesson(currentLesson - 1);
}

function resetProgress() {
  if (!confirm('هل تريد حقاً إعادة الدليل من البداية؟')) return;
  completedLessons.clear();
  currentLesson = 0;
  saveState();
  goToLesson(0);
}

      </div>

      <div class="completion-next">

        <a href="https://lichess.org" target="_blank" class="completion-cta">افتح Lichess ابدأ التطبيق ←</a>
      </div>

      <div class="completion-actions">
        <button class="nav-btn secondary" onclick="goToLesson(0)" style="flex:1">مراجعة من البداية ↩</button>
        <button class="nav-btn secondary" onclick="resetProgress()" style="flex:1;color:var(--accent-red)">إعادة ضبط التقدم</button>
      </div>
    </div>
  `;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  const app = document.getElementById('app');

  app.innerHTML = `

    <div class="progress-container">
      <div class="progress-label">
        <span>المرحلة ${currentLesson + 1} من ${lessons.length}</span>
        <span>${Math.round(progress)}% مكتمل</span>

            <div class="concept-body">

            : `<button class="nav-btn primary" onclick="nextLesson()">أتقنت هذه المرحلة ←</button>`)
          : `<button class="nav-btn primary" onclick="nextLesson()">أنهيت الدليل — شاهد ملخصك ✓</button>`}

}
